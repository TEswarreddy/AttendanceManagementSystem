version: '3.9'

services:

  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports: ["5000:5000"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_APP_NAME: ${APP_NAME:-Attendance Management System}
        VITE_COLLEGE_NAME: ${COLLEGE_NAME:-Your College}
        VITE_ATTENDANCE_THRESHOLD: ${ATTENDANCE_THRESHOLD:-75}
    container_name: attendance_frontend
    ports: ["80:80"]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  uploads_data:

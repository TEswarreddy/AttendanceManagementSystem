name: Validate Secrets
on: [pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are set
        run: |
          MISSING=""
          [ -z "$DOCKER_USERNAME" ] && MISSING="$MISSING DOCKER_USERNAME"
          [ -z "$DOCKER_PASSWORD" ] && MISSING="$MISSING DOCKER_PASSWORD"
          [ -z "$DEPLOY_HOST"    ] && MISSING="$MISSING DEPLOY_HOST"
          [ -z "$DEPLOY_USER"    ] && MISSING="$MISSING DEPLOY_USER"
          [ -z "$DEPLOY_SSH_KEY" ] && MISSING="$MISSING DEPLOY_SSH_KEY"
          if [ -n "$MISSING" ]; then
            echo "Missing secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets present"
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DEPLOY_HOST:     ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER:     ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}

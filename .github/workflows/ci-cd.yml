name: AMS Test & Delivery Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  REGISTRY: docker.io
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/attendance-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/attendance-frontend

jobs:
  lint-and-unit:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Backend lint
        working-directory: backend
        run: npm run lint

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Backend unit tests + coverage
        working-directory: backend
        run: npm run test:unit

      - name: Frontend unit/component tests + coverage
        working-directory: frontend
        run: npm run test:unit

      - name: Upload backend unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-coverage
          path: backend/coverage

      - name: Upload frontend unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-coverage
          path: frontend/coverage

  backend-api-integration-db:
    name: Backend API + Integration + DB
    runs-on: ubuntu-latest
    needs: lint-and-unit
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: API tests
        working-directory: backend
        run: npm run test:api

      - name: Integration tests
        working-directory: backend
        run: npm run test:integration

      - name: DB flow tests
        working-directory: backend
        run: npm run test:db

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-integration-db-coverage
          path: backend/coverage

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright@1.55.0 install --with-deps chromium

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run E2E suite
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report

      - name: Upload Playwright traces/videos/screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-api-integration-db, frontend-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/attendance-system
            echo "BACKEND_TAG=${{ github.sha }}" >> .env
            echo "FRONTEND_TAG=${{ github.sha }}" >> .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
      - name: Health check after deploy
        run: |
          sleep 30
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ secrets.DEPLOY_HOST }}/api/health)
            if [ "$STATUS" = "200" ]; then
              echo "Deploy successful — health check passed"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1

upstream backend {
  server backend:5000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             application/vnd.ms-fontobject application/x-font-ttf image/svg+xml;

  # Security headers
  add_header X-Frame-Options           "SAMEORIGIN"            always;
  add_header X-Content-Type-Options    "nosniff"               always;
  add_header X-XSS-Protection          "1; mode=block"         always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=()" always;

  # Static assets — long cache (Vite adds content hash to filenames)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # API proxy → backend
  location /api/ {
    proxy_pass         http://backend;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 120s;     # PDF generation can take time
    proxy_send_timeout 120s;
    client_max_body_size 10m;    # For file uploads (medical certificates)
  }

  # SPA fallback — all non-file routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Health check endpoint
  location /health {
    access_log off;
    return 200 'healthy';
    add_header Content-Type text/plain;
  }
}
